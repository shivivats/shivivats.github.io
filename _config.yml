# Site
name: "Shivi's Portfolio and Blog"
title: "Shivi's Portfolio and Blog"
description: "My Portfolio and Blog."
logo: 'assets/images/logo.png'
favicon: 'assets/images/logo.png'
include: ["_pages"]
#permalink: /:title/

defaults:
  -
    scope:
      path: "_posts/portfolio" 
    values:
      permalink: /portfolio/:title/
      excerpt_separator: <!--more-->
  -
    scope:
      path: "_posts/blog" 
    values:
      permalink: /blog/:title/
      excerpt_separator: <!--more-->



# Authors
authors:
  shivi:
    name: Shivi
    display_name: Shivi
    avatar: 'assets/images/avatar.png'
    email: shivivats.dev@gmail.com
    web: https://shivivats.github.io
    twitter: 
    description: "Game Developer and Masters Student. I like to experiement with different types of programming projects."

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
    
# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'
    
# Pagination 
paginate: 6
paginate_path: /page:num/
    
# Other
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Adsense (change to "enabled" to activate, also your client id and ad slot. Create a new ad unit from your Adsense account to get the slot.)
adsense: "disabled"
adsense-data-ad-client: ""
adsense-data-ad-slot: ""

# Lazy Images ("enabled" or "disabled")
lazyimages: "disabled"

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock]
