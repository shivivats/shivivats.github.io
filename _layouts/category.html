---
layout: default
---

<!-- Posts Index for this Category
================================================== -->
<section class="recent-posts">

    <div class="section-title">

		<!-- Change to Category Name here -->
        <h2><span>{{page.category_name}} Projects</span></h2>

    </div>

    <div class="row listrecent">
		
		{% if site.categories[page.category_name] %}
		
			{% for post in site.categories[page.category_name] %}

					{% include postbox.html %}

			{% endfor %}
		
		{% else %}

		<p>No posts for this category.</p>

		{% endif %}
    </div>

</section>
